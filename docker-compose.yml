services:
  # 前端服务
  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* 在构建期内联，必须在 build 阶段传入。
        # Supabase 的 URL / anon key 从根目录 .env 读取（anon key 本就是公开给浏览器用的）。
        - NEXT_PUBLIC_API_URL=https://api.passionie.uk
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
    depends_on:
      - api

  # 后端服务
  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

networks:
  default:
    name: passion_network
